name: Deploy React App

on:
  workflow_run:
    workflows: ['Build React App', 'Build & Deploy Infrastructure']
    types:
      - completed
    branches: [main]

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_REGION: eu-north-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v3

      - name: Download build artifacts
        uses: actions/download-artifacts@v4
        with:
          name: react-app-build-${{ github.event.workflow_run.run_number }}
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.PREVIEW_REACT_APP_DEPLOY_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get infrastructure outputs from Terraform
        id: get-infra-outputs
        working-directory: ./infrastructure
        run: |
          # Get the infrastructure outputs directly from Terraform
          echo "CLOUDFRONT_DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_ENV
          echo "S3_BUCKET_NAME=$(terraform output -raw s3_bucket_name)" >> $GITHUB_ENV

      - name: Upload static assets to S3
        run: |
          aws s3 sync ./dist s3://${{ env.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Display deployment info
        run: |
          echo "✅ Deployment completed successfully!"
          echo "📦 S3 Bucket: ${{ env.S3_BUCKET_NAME }}"
          echo "🔄 CloudFront Distribution ID: ${{ env.CLOUDFRONT_DISTRIBUTION_ID }}"
