name: Build React App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-artifacts: ${{ steps.upload-artifacts.outputs.name }}
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build React application
        run: npm run build
        env:
          VITE_NEXT_APP_DOMAIN: ${{ secrets.NEXT_APP_DOMAIN }}

      - name: Upload build artifacts
        uses: actions/upload-artifacts@v4
        id: upload-artifacts
        with:
          name: react-app-build-${{ github.run_number }}
          path: dist/
          retention-days: 7
